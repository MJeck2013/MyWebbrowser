<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #121212; 
      color: #ffffff;            
      font-family: sans-serif;
      padding: 20px;
    }
    input[type="text"] {
      background-color: #222222; 
      color: #ffffff;           
      border: 1px solid #444444; 
      padding: 10px;
      width: 80%;
      border-radius: 4px;
    }
    input[type="text"]::placeholder {
      color: #bbbbbb;
    }
  </style>
  <title>MakeAnApp</title>
</head>
<body>
  <h1>Welcome To MakeAnApp!</h1>
  <h4>Tell Us The Functions of your App</h4>
  <input type="text" id="app_description" name="app_description" placeholder="Tell Us Your Description of It.">
  <h4>Tell Us the Name of Your App!</h4>
  <input type="text" id="app_name" name="app_name" placeholder="Tell Us The Name of It.">
</body>
</html>
